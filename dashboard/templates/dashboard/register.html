<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostureAI - Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #312e81, #0f172a), radial-gradient(circle at bottom left, #764ba2, #0f172a); 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            margin: 0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            min-height: 520px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .form-control, .form-select { border-radius: 10px; padding: 10px; font-size: 0.85rem; border: 1px solid #e2e8f0; background: #f8fafc; }
        .btn-main { background: #667eea; color: white; padding: 10px; border-radius: 12px; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-main:hover { background: #764ba2; color: white; }
        .logo-container img { height: 100px; margin-bottom: 0.5rem; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: #667eea; text-transform: uppercase; text-align: left; margin-top: 0.5rem; margin-bottom: 0.3rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-container">
            <a href="{% url 'landing' %}">
                <img src="{% static 'dashboard/img/Logo.png' %}" alt="Logo">
            </a>
            <h2 class="fw-bold">Créer un compte</h2>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="section-title">Infos de base</div>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="text" name="username" class="form-control" placeholder="Utilisateur" required></div>
                <div class="col-6"><input type="email" name="email" class="form-control" placeholder="Email" required></div>
            </div>
            <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Mot de passe" required></div>
            
            <div class="section-title">Profil Postural</div>
            <div class="row g-2 mb-2">
                <div class="col-4"><input type="number" step="0.1" name="taille" class="form-control" placeholder="Taille (cm)"></div>
                <div class="col-4"><input type="number" step="0.1" name="poids_kg" class="form-control" placeholder="Poids (kg)"></div>
                <div class="col-4">
                    <select name="activite" class="form-select">
                        <option value="sedentaire">Sédentaire</option>
                        <option value="actif">Actif</option>
                        <option value="sportif">Sportif</option>
                    </select>
                </div>
            </div>
            <div class="mb-3"><textarea name="pathologies" class="form-control" rows="2" placeholder="Pathologies (Optionnel)"></textarea></div>

            <button type="submit" class="btn btn-main">S'inscrire</button>
        </form>
        <p class="mt-3 small text-muted">Déjà membre ? <a href="{% url 'signin' %}" class="text-decoration-none fw-bold" style="color: #667eea;">Connectez-vous</a></p>
    </div>
</body>
</html>
