<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostureAI - Mon Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f0f4ff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border-radius: 20px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-card">
                    <h3 class="fw-bold mb-4">Mon Profil</h3>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Nom d'utilisateur</label>
                            <input type="text" class="form-control" value="{{ user.username }}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Taille (cm)</label>
                            <input type="number" step="0.1" name="taille" class="form-control" value="{{ user.profile.taille|default:'' }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Poids (kg)</label>
                            <input type="number" step="0.1" name="poids_kg" class="form-control" value="{{ user.profile.poids_kg|default:'' }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Activité</label>
                            <select name="activite" class="form-select">
                                {% for key, label in activite_choices %}
                                    <option value="{{ key }}" {% if user.profile.activite == key %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Pathologies</label>
                            <textarea name="pathologies" class="form-control" rows="3">{{ user.profile.pathologies|default:'' }}</textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
                        <a href="{% url 'home' %}" class="btn btn-link w-100 mt-2 text-muted">Retour au Dashboard</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
