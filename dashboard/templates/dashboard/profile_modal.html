<!-- Modal de profil créatif -->
<div class="modal fade" id="profileModal" tabindex="-1" aria-hidden="true" style="z-index: 1055;">
    <div class="modal-dialog modal-dialog-centered" style="z-index: 1060;">
        <div class="modal-content glass-card p-4">
            <div class="modal-header border-0 mb-2">
                <h5 class="modal-title fw-bold text-primary"><i class="bi bi-person-circle me-2"></i>Mon Profil</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <form method="post" action="{% url 'profile_settings' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small">Taille (cm)</label>
                        <input type="number" step="0.1" name="taille" class="form-control rounded-pill border-0 shadow-sm" value="{{ user.profile.taille|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small">Poids (kg)</label>
                        <input type="number" step="0.1" name="poids_kg" class="form-control rounded-pill border-0 shadow-sm" value="{{ user.profile.poids_kg|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label for="activiteSelect" class="form-label fw-bold text-muted small">Niveau d'activité</label>
                        <select id="activiteSelect" name="activite" class="form-select rounded-pill border-0 shadow-sm">
                            {% for key, label in activite_choices %}
                                <option value="{{ key }}" {% if user.profile.activite == key %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted small">Pathologies</label>
                        <textarea name="pathologies" class="form-control rounded-4 border-0 shadow-sm" rows="3">{{ user.profile.pathologies|default:'' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm">Enregistrer les modifications</button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .modal-backdrop { background-color: rgba(102, 126, 234, 0.2) !important; backdrop-filter: blur(8px); }
    .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
    .form-control:focus, .form-select:focus { box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2); }
</style>
