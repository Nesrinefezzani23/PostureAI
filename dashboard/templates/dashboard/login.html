<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostureAI - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #312e81, #0f172a), radial-gradient(circle at bottom left, #764ba2, #0f172a); 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .form-control { border-radius: 10px; padding: 10px; font-size: 0.85rem; border: 1px solid #e2e8f0; background: #f8fafc; }
        .btn-main { background: #667eea; color: white; padding: 10px; border-radius: 12px; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-main:hover { background: #764ba2; color: white; }
        .logo-container img { height: 100px; margin-bottom: 0.5rem; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: #667eea; text-transform: uppercase; text-align: left; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-container">
            <a href="{% url 'landing' %}">
                <img src="{% static 'dashboard/img/Logo.png' %}" alt="Logo">
            </a>
            <h2 class="fw-bold">Bon retour !</h2>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="section-title">Informations d'accès</div>
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required>
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
            </div>
            <button type="submit" class="btn btn-main">Se connecter</button>
        </form>
        <p class="mt-3 small text-muted">Pas encore membre ? <a href="{% url 'signup' %}" class="text-decoration-none fw-bold" style="color: #667eea;">Inscrivez-vous</a></p>
    </div>
</body>
</html>
